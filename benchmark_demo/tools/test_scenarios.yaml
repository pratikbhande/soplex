scenarios:
  - name: successful_kyc_onboarding
    description: Standard KYC process with clean customer
    initial_state:
      company_number: "12345678"
      company_name: "TechCorp Ltd"
      director_name: "John Smith"
      director_id: "DIR-001"
      director_email: "john@techcorp.co.uk"
    expected_outcome: end_success
    expected_duration_ms: 3000

  - name: inactive_company_rejection
    description: Company with inactive status should be rejected
    initial_state:
      company_number: "99999999"
      company_name: "Dissolved Corp"
      company_status: "Dissolved"
      director_name: "Jane Doe"
      director_id: "DIR-002"
    expected_outcome: end_reject
    expected_duration_ms: 2000

  - name: pep_match_escalation
    description: Director triggers PEP match requiring compliance escalation
    initial_state:
      company_number: "12345678"
      company_name: "CleanCorp Ltd"
      director_name: "PEP Match"
      director_id: "DIR-PEP"
      pep_status: "politically_exposed"
    expected_outcome: escalate_compliance
    expected_duration_ms: 4000

  - name: identity_verification_failure
    description: Director identity verification fails
    initial_state:
      company_number: "12345678"
      director_name: "John Smith"
      director_id: "DIR-FRAUD"
      verification_status: "failed"
    expected_outcome: escalate_compliance
    expected_duration_ms: 3500

  - name: high_risk_sector_review
    description: High-risk industry sector requires manual review
    initial_state:
      company_number: "12345678"
      company_name: "CryptoCorp Ltd"
      sector: "cryptocurrency"
      risk_score: 95
      director_name: "John Smith"
      director_id: "DIR-001"
    expected_outcome: escalate_compliance
    expected_duration_ms: 5000

benchmarks:
  cost_thresholds:
    max_cost_per_execution: 0.05  # Maximum $0.05 per full KYC process
    target_cost_savings_vs_traditional: 70  # Target 70%+ savings

  performance_thresholds:
    max_execution_time_ms: 10000  # Maximum 10 seconds per process
    min_accuracy_percent: 95      # Minimum 95% decision accuracy

  scalability_targets:
    concurrent_executions: 100    # Support 100 concurrent KYC processes
    daily_throughput: 10000       # Process 10,000 KYC requests per day